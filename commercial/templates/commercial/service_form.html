{% extends "base.html" %}

{% block title %}Cadastro de Serviço{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow border-0">
            <div class="card-header bg-white py-3">
                <h5 class="m-0 fw-bold text-primary">
                    {% if form.instance.pk %}Editar Serviço{% else %}Novo Serviço{% endif %}
                </h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label fw-bold">Nome do Procedimento</label>
                            {{ form.name }}
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-bold">Preço de Tabela (R$)</label>
                            {{ form.default_price }}
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label">Descrição / O que está incluso</label>
                            {{ form.description }}
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="{% url 'commercial:service_list' active_company.id %}" class="btn btn-light border">Cancelar</a>
                        <button type="submit" class="btn btn-primary px-4">Salvar Serviço</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
