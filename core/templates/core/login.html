<!DOCTYPE html>
<html lang="pt-br">
    {% load static %}
    <head>
        <meta charset="UTF-8" />
        <title>Controle +</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description"
              content="Faça login para acessar o Controle +, sua plataforma de controle financeiro." />
        <meta name="keywords"
              content="controle financeiro, login, finanças, orçamento, Controle +" />
        <!-- Google Fonts + Bootstrap Icons -->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
              rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
              rel="stylesheet" />
        <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #4159D0, #C84FC0, #FFCD70);
        }

        .login-container {
            background-color: #fff;
            padding: 3rem 2rem;
            border-radius: 1rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 400px;
        }

        .login-container h1 {
            font-weight: 700;
            font-size: 1.75rem;
            text-align: center;
            margin-bottom: 1rem;
            color: #4159D0;
        }

        .login-container p {
            text-align: center;
            margin-bottom: 2rem;
            color: #555;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        form input {
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        .btn-entrar {
            background: linear-gradient(90deg, #5B86E5, #36D1DC);
            border: none;
            padding: 0.85rem;
            border-radius: 0.5rem;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s ease;
            letter-spacing: 0.5px;
        }
        .btn-entrar:hover { opacity: 0.9; }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #333;
            margin-bottom: 0.4rem;
            display: block;
        }
        .form-control {
            border-radius: 0.5rem;
            border: 1.5px solid #ddd;
            font-size: 1rem;
            padding: 0.75rem;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: #5B86E5;
            box-shadow: 0 0 0 3px rgba(91,134,229,0.15);
            outline: none;
        }
        .input-group .form-control { border-right: none; }
        .input-group .btn-outline-secondary {
            border: 1.5px solid #ddd;
            border-left: none;
            border-radius: 0 0.5rem 0.5rem 0;
            color: #999;
            background: #fff;
        }
        .input-group .btn-outline-secondary:hover { color: #555; background: #f8f8f8; }

        .form-errors {
            color: #d9534f;
            font-size: 0.9rem;
        }

        @media (max-width: 500px) {
            .login-container {
                margin: 1rem;
                padding: 2rem 1.5rem;
            }
        }
        .logo-container {
            text-align: center;
        }
        .logo-img {
            max-width: 200px;
            height: auto;
            display: inline-block;
        }
        </style>
    </head>
    <body>
        <div class="login-container">
            <div class="logo-container">
                <img src="{% static 'img/logo azul.png' %}"
                     alt="Controle +"
                     class="logo-img"
                     width="200"
                     height="auto">
            </div>
            <p>Bem-vindo de volta. Acesse sua conta.</p>
            <form method="post">
                {% csrf_token %}
                {% if form.errors %}
                    <div class="form-errors">
                        <i class="bi bi-exclamation-circle me-1"></i> Usuário ou senha incorretos.
                    </div>
                {% endif %}
                <div class="mb-3">
                    <label for="id_username" class="form-label">Usuário</label>
                    <input type="text" name="username" id="id_username"
                           class="form-control form-control-lg"
                           placeholder="Digite seu usuário" autofocus autocomplete="username">
                </div>
                <div class="mb-4">
                    <label for="id_password" class="form-label">Senha</label>
                    <div class="input-group">
                        <input type="password" name="password" id="id_password"
                               class="form-control form-control-lg"
                               placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="btn btn-outline-secondary"
                                onclick="togglePassword()" title="Mostrar/ocultar senha">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-entrar">Entrar</button>
            </form>
            <script>
                function togglePassword() {
                    const input = document.getElementById('id_password');
                    const icon = document.getElementById('toggleIcon');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.className = 'bi bi-eye-slash';
                    } else {
                        input.type = 'password';
                        icon.className = 'bi bi-eye';
                    }
                }
            </script>
        </div>
    </body>
</html>
