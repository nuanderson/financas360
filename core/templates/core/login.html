<!DOCTYPE html>
<html lang="pt-br">
    {% load static %}
    <head>
        <meta charset="UTF-8" />
        <title>Controle +</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description"
              content="Faça login para acessar o Controle +, sua plataforma de controle financeiro." />
        <meta name="keywords"
              content="controle financeiro, login, finanças, orçamento, Controle +" />
        <!-- Google Fonts + Bootstrap Icons -->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
              rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
              rel="stylesheet" />
        <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #4159D0, #C84FC0, #FFCD70);
        }

        .login-container {
            background-color: #fff;
            padding: 3rem 2rem;
            border-radius: 1rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 400px;
        }

        .login-container h1 {
            font-weight: 700;
            font-size: 1.75rem;
            text-align: center;
            margin-bottom: 1rem;
            color: #4159D0;
        }

        .login-container p {
            text-align: center;
            margin-bottom: 2rem;
            color: #555;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        form input {
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        form button {
            background: linear-gradient(90deg, #5B86E5, #36D1DC);
            border: none;
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        form button:hover {
            background: linear-gradient(90deg, #4a75cc, #2ab8c6);
        }

        .form-errors {
            color: #d9534f;
            font-size: 0.9rem;
        }

        @media (max-width: 500px) {
            .login-container {
                margin: 1rem;
                padding: 2rem 1.5rem;
            }
        }
        .logo-container {
            text-align: center;
        }
        .logo-img {
            max-width: 200px;
            height: auto;
            display: inline-block;
        }
        </style>
    </head>
    <body>
        <div class="login-container">
            <div class="logo-container">
                <img src="{% static 'img/logo azul.png' %}"
                     alt="Controle +"
                     class="logo-img"
                     width="200"
                     height="auto">
            </div>
            <p>Por favor, entre com suas credenciais.</p>
            <form method="post">
                {% csrf_token %}
                {% if form.errors %}<div class="form-errors">Verifique os campos preenchidos.</div>{% endif %}
                {{ form.as_p }}
                <button type="submit">Entrar</button>
            </form>
        </div>
    </body>
</html>
