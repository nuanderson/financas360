{% extends "base.html" %}
{% block title %}Excluir Nota{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow border-0">
      <div class="card-header bg-danger text-white">
        <h5 class="mb-0">
          <i class="bi bi-trash me-2"></i>Confirmar Exclusão
        </h5>
      </div>
      <div class="card-body text-center py-4">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem;"></i>
        <p class="mt-3 mb-1">Tem certeza que deseja excluir permanentemente a nota:</p>
        <p class="fw-bold fs-5">
          "{{ note.title|default:"(sem título)" }}"
        </p>
        <p class="text-muted small">Esta ação não pode ser desfeita.</p>

        <form method="post" class="d-flex justify-content-center gap-3 mt-4">
          {% csrf_token %}
          <a href="{% url 'core:note_list' %}" class="btn btn-secondary px-4">
            <i class="bi bi-x-lg me-1"></i>Cancelar
          </a>
          <button type="submit" class="btn btn-danger px-4">
            <i class="bi bi-trash me-1"></i>Excluir
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
