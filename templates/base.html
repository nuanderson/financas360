<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            {% block title %}Finanças 360{% endblock %}
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
              rel="stylesheet"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
              crossorigin="anonymous">
        <style>
        /* Estilo para o layout principal */
        body {
            display: flex;
            min-height: 100vh;
        }

        /* Estilo da nossa Sidebar */
        .sidebar {
            width: 280px;
            min-height: 100vh;
            color: white;
            padding: 1.5rem;
            /* A cor gradiente que você pediu! */
            background: linear-gradient(45deg, rgba(65, 89, 208, 1.000) 0.000%, rgba(200, 79, 192, 1.000) 50.000%, rgba(255, 205, 112, 1.000) 100.000%);
        }

        /* Estilo da área de conteúdo principal */
        .main-content {
            flex-grow: 1; /* Faz ocupar o resto do espaço */
            padding: 2rem;
            background-color: #f8f9fa; /* Um cinza claro */
        }
        </style>
    </head>
    <body>
        <aside class="sidebar">
            <h3>Finanças 360</h3>
            <hr>
            {% if active_company %}
                <div class="mb-3">
                    <small>Empresa Ativa:</small>
                    <h5>{{ active_company.name }}</h5>
                </div>
            {% endif %}
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link text-white" href="{% url 'core:company_list' %}">Trocar Empresa</a>
                </li>
                {% if active_company %}
                    <li class="nav-item">
                        <a class="nav-link text-white"
                           href="{% url 'core:chart_of_accounts_list' active_company.id %}">Plano de Contas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{% url 'core:transaction_list' %}">Lançamentos</a>
                    </li>
                {% endif %}
            </ul>
        </aside>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
                crossorigin="anonymous"></script>
    </body>
</html>
