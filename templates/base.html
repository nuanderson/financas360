<!DOCTYPE html>
<html lang="pt-br">
    {% load static %}
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description"
              content="Sistema de controle financeiro e gestão de plantões para empresas.">
        <meta name="keywords"
              content="finanças, controle, gestão, plantões, orçamento, dashboard, empresa">
        <title>
            {% block title %}
                Controle +
            {% endblock title %}
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
              rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
              rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
              rel="stylesheet" />
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
              rel="stylesheet" />
        <style>
        .logo-img {
            max-width: 200px;
            width: 200px;
            height: 60px;
            height: auto;
        }
        body {
            display: flex;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: #f1f3f5;
            color: #343a40;
        }

        /* Estilos da Sidebar */
        .sidebar {
            width: 280px;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            background: linear-gradient(45deg, #4159D0, #C84FC0, #FFCD70);
            color: white;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .sidebar h3 { font-weight: 700; margin-bottom: 1.5rem; }
        .sidebar small { font-size: 0.85rem; }

        .nav-link {
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 0.375rem;
            padding-left: 0.75rem;
        }

        .main-content {
            flex-grow: 1;
            padding: 2.5rem;
            background-color: #f8f9fa;
        }

        .active-company {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }

        hr { border-color: rgba(255, 255, 255, 0.3); }

        .footer-user { font-size: 0.9rem; }
        a.text-white.fw-bold:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding: 1rem;
            }
            .main-content { padding: 1rem; }
            .sidebar .nav { flex-direction: row; gap: 1rem; }
        }
        .sidebar-hr { border-color: rgba(255,255,255,0.3); }
        </style>
        {% block extra_css %}
        {% endblock extra_css %}
    </head>
    <body>
        
        {% include 'sidebar.html' %}

        <main class="main-content">
            {% block content %}
            {% endblock content %}
        </main>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
        <script>
            $(document).ready(function() {
                $('.select2-widget').select2({
                    theme: "bootstrap-5"
                });
            });
        </script>
        {% block extra_js %}
        {% endblock extra_js %}
    </body>
</html>
